<!--
  Moodle Database Add Template – Prompt-Bibliothek
  Gestaltung wie List/Single View (Windows11-Stil, gleiche Farben & Typografie)
-->
<div id="defaulttemplate-addentry" class="prompt-add-form">
  <div class="prompt-add-form__window">
    <header class="prompt-add-form__titlebar">
      <span class="prompt-add-form__title">Neuen Prompt anlegen</span>
    </header>
    <div class="prompt-add-form__body">
      <div class="prompt-add-form__group">
        <div class="prompt-add-form__label">Titel</div>
        [[Titel]]
      </div>
      <div class="prompt-add-form__group">
        <div class="prompt-add-form__label">Prompt</div>
        [[Prompt]]
      </div>
      <div class="prompt-add-form__group">
        <div class="prompt-add-form__label">Kategorie</div>
        [[Kategorie]]
      </div>
      <div class="prompt-add-form__group">
        <div class="prompt-add-form__label">Systemprompt</div>
        [[Systemprompt]]
      </div>
      <div class="prompt-add-form__group">
        <div class="prompt-add-form__label">Beispiel-Output</div>
        [[Beispiel-Output]]
      </div>
    </div>
  </div>
</div>
